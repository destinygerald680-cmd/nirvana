<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
  <title>Sign In and Sign Out Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="forms-container">
      <div class="signin-signup">
        <form action="#
        " class="sign-in-form">
          <h2 class="title">Sign in</h2>
          <div class="input-field">
            <i id="user-icon" class="fas fa-user"></i>
            <input id="username" type="text" placeholder="Username" />
          </div>
          <div class="input-field">
            <i id="password-icon" class="fas fa-lock"></i>
            <input id="password" type="password" placeholder="Password" />
          </div>
          <input type="submit"  class="btn solid"value="Login"/>
          <p class="social-text">Or Sign in with social platforms</p>
          <div class="social-media">
          <a href="#" class="social-icon">
                <i class="fab fa-instagram"></i>


            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-google"></i>
            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-tiktok"></i>
            </a>
        </form>
      </div>
       <div class="signup-signup">
        <form action="#
        " class="sign-up-form">
          <h2 class="title">Sign up</h2>
          <div class="input-field">
            <i id="user-icon" class="fas fa-user"></i>
            <input id="username" type="text" placeholder="Username" />
          </div>
          <div class="input-field">
            <i id="email-icon" class="fas fa-envelope"></i>
            <input id="email" type="email" placeholder="Email" />
          </div>
          <div class="input-field">
            <i id="password-icon" class="fas fa-lock"></i>
            <input id="password" type="password" placeholder="Password" />
          </div>
          <input type="submit"  class="btn solid"value="Login"/>
          <p class="social-text">Or Sign up with social platforms</p>
          <div class="social-media">
          <a href="#" class="social-icon">
                <i class="fab fa-instagram"></i>


            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-google"></i>
            </a>
            <a href="#" class="social-icon">
              <i class="fab fa-tiktok"></i>
            </a>
        </form>
      </div>
    </div>
    </div>

    <div class="panels-container">
    <div class="panel left-panel">
    <div class="content">
    <h3>NEW HERE</h3>
    <P>Experience the future of authentication with our security system</p>
    <button class="btn transparent" 
    id="sign-up-button">Sign up</button>
    </div>
    <img src="img/log.svag"  alt"" class="image">
    </div>


    <div class="panel right-panel">
    <div class="content">
    <h3>ONE OF US</h3>
    <P>Experience the future of authentication with our security system</p>
    <button class="btn transparent" 
    id="sign-in-button">Sign in</button>
    </div>
    <img src="img/"  alt="" class="image">
    </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
